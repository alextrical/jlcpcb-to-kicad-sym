name: Check JLC parts update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-\ps.fetch.outputs.updated_at }}

    steps:
      - name: Restore previous state
        uses: actions/cache/restore@v5
        id: cache-restore
        with:
          path: .state
          key: jlcparts-state-${{ github.run_id }}
          restore-keys: |
            jlcparts-state-

      - name: Create state dir
        run: mkdir -p .state

      - name: Fetch remote JSON
        id: fetch
        run: |
          curl -fsSL \
            https://yaqwsx.github.io/jlcparts/data/parts.checkpoint.json \
            -o .state/current.json

          updated_at=$(jq -r '.updatedAt' .state/current.json)
          echo "updated_at=$updated_at" >> "$GITHUB_OUTPUT"

      - name: Compare with previous run
        id: compare
        run: |
          previous=""
          if [ -f .state/last_updated_at.txt ]; then
            previous=$(cat .state/last_updated_at.txt)
          fi

          current="${{ steps.fetch.outputs.updated_at }}"

          if [ "$current" != "$previous" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "$current" > .state/last_updated_at.txt
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save state
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .state
          key: jlcparts-state-${{ github.run_id }}

      - name: Stop here if unchanged
        if: steps.compare.outputs.changed != 'true'
        run: echo "No change detected, skipping remaining work."

      - name: Run your real job
        if: steps.compare.outputs.changed == 'true'
        run: |
          echo "Detected change at ${{ steps.fetch.outputs.updated_at }}"
          # put the expensive work here
