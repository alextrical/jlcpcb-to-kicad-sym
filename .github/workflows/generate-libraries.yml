name: Generate KiCad libraries

on:
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force the release workflow to run'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "30 */1 * * *"   #At minute 30 past every hour.
  push:
    branches:
      - main
    paths:
      - "generate.sh"
      - "src/*.py"
      - ".gitmodules"
      - ".github/workflows/generate-libraries.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
      updated_at: ${{ steps.fetch.outputs.updated_at }}

    steps:
      - name: Restore previous state
        uses: actions/cache/restore@v5
        id: cache-restore
        with:
          path: .state
          key: jlcparts-state-${{ github.run_id }}
          restore-keys: |
            jlcparts-state-

      - name: Create state dir
        run: mkdir -p .state

      - name: Fetch remote JSON
        id: fetch
        run: |
          curl -fsSL \
            https://yaqwsx.github.io/jlcparts/data/parts.checkpoint.json \
            -o .state/current.json

          updated_at=$(jq -r '.updatedAt' .state/current.json)
          echo "updated_at=$updated_at" >> "$GITHUB_OUTPUT"

      - name: Compare with previous run
        id: compare
        run: |
          previous=""
          if [ -f .state/last_updated_at.txt ]; then
            previous=$(cat .state/last_updated_at.txt)
          fi

          current="${{ steps.fetch.outputs.updated_at }}"

          if [ "$current" != "$previous" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "$current" > .state/last_updated_at.txt
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save state
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .state
          key: jlcparts-state-${{ github.run_id }}

  build-and-publish:
    runs-on: ubuntu-latest
    needs: check
    if: ${{ needs.check.result == 'skipped' || needs.check.outputs.changed == 'true' }}

    permissions:
      contents: read

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          path: source
          persist-credentials: false
          submodules: recursive

      - name: Checkout generated libraries repo
        uses: actions/checkout@v6
        with:
          repository: alextrical/kicad-jlcpcb-libraries
          token: ${{ secrets.LIBS_REPO_PAT }}
          path: libraries
          persist-credentials: false

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r source/src/kicad-library-utils/requirements.txt

      - name: Run generator
        working-directory: source
        run: |
          chmod +x ./generate.sh
          ./generate.sh

      - name: Replace generated files in destination repo
        run: |
          mkdir -p libraries/symbols
          find libraries/symbols -type f -name '*.kicad_sym' -delete
          cp source/build/*.kicad_sym libraries/symbols/

          sha256sum source/build/*.kicad_sym | sort -k2 > /tmp/symbols.sha256
          generated_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          source_count="$(find source/build -maxdepth 1 -type f -name '*.kicad_sym' | wc -l | tr -d ' ')"

          cat > libraries/manifest.json <<EOF
          {
            "generated_at": "${generated_at}",
            "source": "source/build",
            "destination": "libraries/symbols",
            "file_count": ${source_count},
            "files_sha256": [
          $(awk 'BEGIN { first = 1 } { if (!first) printf ",\n"; first = 0; printf "      {\"file\": \"%s\", \"sha256\": \"%s\"}", $2, $1 }' /tmp/symbols.sha256)
            ]
          }
          EOF

      - name: Commit, push and release if symbols changed
        env:
          GH_TOKEN: ${{ secrets.LIBS_REPO_PAT }}
        working-directory: libraries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add symbols

          if git diff --cached --quiet -- symbols; then
            echo "No changes in symbols; skipping commit"
            git restore --staged manifest.json VERSION 2>/dev/null || true
            rm -f manifest.json VERSION
            exit 0
          fi

          # Get current date in YYYY.MM.DD format
          current_date=$(date -u +'%Y.%m.%d')

          # Get the latest version tag (e.g., 2026.01.01R1)
          latest_tag=$(gh release list --repo alextrical/kicad-jlcpcb-libraries | head -n1 | awk '{print $1}')
          
          if [[ -z "$latest_tag" ]] || [[ ! "$latest_tag" =~ ^([0-9]{4}\.[0-9]{2}\.[0-9]{2})R([0-9]+)$ ]]; then
            # No previous tag: start with patch 0
            patch=0
          else
            # Extract date and patch number from latest tag
            latest_date=$(echo "$latest_tag"  | sed -E 's/([0-9]{4}\.[0-9]{2}\.[0-9]{2})R[0-9]+/\1/')
            latest_patch=$(echo "$latest_tag" | sed -E 's/[0-9]{4}\.[0-9]{2}\.[0-9]{2}R([0-9]+)/\1/')
            
            if [ "$latest_date" == "$current_date" ]; then
              # Same day: increment patch
              patch=$((latest_patch + 1))
            fi
          fi

          release_tag="${current_date}R${patch}"


          printf '%s\n' "$release_tag" > VERSION
          git add manifest.json VERSION
          git commit -m "Update generated KiCad libraries"
          git push https://x-access-token:${{ secrets.LIBS_REPO_PAT }}@github.com/alextrical/kicad-jlcpcb-libraries.git HEAD:main

          gh release create "${release_tag}" \
            --repo alextrical/kicad-jlcpcb-libraries \
            --target main \
            --title "${release_tag}" \
            --notes "Automated KiCad library release for current_date (patch ${patch})"